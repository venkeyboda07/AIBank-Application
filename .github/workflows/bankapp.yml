# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: AIBankApp-CI-CD

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

jobs:

  build-maven:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------
      #  Checkout Source Code
      # -------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -------------------------------
      # Setup Java
      # -------------------------------

      - name: Build with Maven
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      # -------------------------------
      #  Cache Maven Packages
      # -------------------------------
      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # -------------------------------
      # Build Application
      # -------------------------------
      - name: Build with Maven
        run: mvn clean package -DskipTests

  Image-build-Scan-Push:      
    runs-on: ubuntu-latest
    needs: [build-maven]

    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      # -------------------------------
      #  Checkout Source Code
      # -------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -------------------------------
      # Trivy File System Scan
      # -------------------------------
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
        
      # -------------------------------
      # Docker Login
      # -------------------------------
      - name: DockerHub Login
        run: echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

      # -------------------------------
      # Build Docker Image
      # -------------------------------
      - name: Build Docker Image
        run: |
          docker build -t aibankapp .
          docker tag aibankapp:latest $DOCKER_USERNAME/aibankapp:${{ github.run_number }}
      # -------------------------------
      # Trivy Docker Image Scan
      # -------------------------------
      - name: Trivy Image Scan
        run: |
          trivy image --severity HIGH,CRITICAL --format table -o trivy-report.txt $DOCKER_USERNAME/aibankapp:latest

      # -------------------------------
      # Push Image to DockerHub
      # -------------------------------
      - name: Push Docker Image
        run: |
          docker push $DOCKER_USERNAME/aibankapp:latest
      # -------------------------------
      # upload trivy Artifacts report 
      # -------------------------------
      - name: upload report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt

# ==========================================================
# 3. CREATE EKS CLUSTER
# ==========================================================
  eks-create:
    runs-on: ubuntu-latest
    needs: [build-maven,Image-build-Scan-Push]

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

# --------------------------------
# Install AWS CLI
# --------------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: Infra
        run: terraform init

      - name: Terraform Plan
        working-directory: Infra
        run: |
          terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: Infra
        run: terraform apply -auto-approve tfplan

  deploy-app:
    runs-on: ubuntu-latest
    needs: [build-maven,Image-build-Scan-Push,eks-create]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name aibankapp-eks --region us-east-1

      # - name: Deploy App
      #   run: kubectl apply -f kubernetes/