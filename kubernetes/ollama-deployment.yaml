apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: bankapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434

---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: bankapp
spec:
  selector:
    app: ollama
  ports:
  - port: 11434
    targetPort: 11434        